<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema</title>
    <link rel="stylesheet" href="css/visualesIndex.css">
    <script src="js/funcionesModal.js"></script>
</head>

<body>

    <nav class="navbar">
        <div class="user-menu-container">
            <button id="user-menu-btn" class="user-btn">
                <img src="img/usuario.png" alt="User" class="nav-user-icon">
                <span id="user-name">Miguel Alberto</span>
                <img src="img/flecha.png" class="nav-flecha">
            </button>

            <ul id="dropdown-menu" class="dropdown-content">
                <li><a href="#" id="btn-logout">Cerrar Sesión</a></li>
            </ul>
        </div>
    </nav>

    <input type="checkbox" id="check">
    <label for="check">
        <img src="img/menu-hamburguesa.png" alt="menu" id="bar">
    </label>

    <div class="sidebar">
        <h2><img src="img/ITO.png" alt="Logo ITO" class="logo-ito">Formulario</h2>
        <ul>
            <li><a href="#"><img src="img/hogar.png">Inicio</a></li>
            <li>
                <input type="checkbox" id="btn-usuarios" class="toggle-submenu">
                <label for="btn-usuarios" class="menu-btn">
                    <img src="img/usuario.png">Usuarios
                    <img src="img/flecha.png" class="flecha">
                </label>
                <ul class="submenu">
                    <li><a href="#" id="btn-abrir-modal"><img src="img/agregar-usuario.png">Capturar</a></li>
                </ul>
            </li>
        </ul>
    </div>

    <div class="contenido-principal">
        <div id="formulario-captura" class="contenedor-formulario" style="display: none;">
            <div id="form-registro" class="simulated-form">
                <h2>Captura de Datos</h2>
                <div class="form-row full-width">
                    <div class="grupoFormulario">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Ej. Ingrese su nombre completo">
                    </div>
                </div>

                <div class="form-row">
                    <div class="grupoFormulario">
                        <label for="username-registro">Correo Electrónico</label>
                        <input type="email" id="username-registro" placeholder="estudiante@correo.com">
                    </div>
                    <div class="grupoFormulario">
                        <label for="num-control">Número de Control</label>
                        <input type="text" id="num-control" placeholder="123456">
                    </div>
                </div>

                <div class="form-row">
                    <div class="grupoFormulario">
                        <label for="password-registro">Contraseña</label>
                        <input type="password" id="password-registro" placeholder="••••••••">
                    </div>
                    <div class="grupoFormulario">
                        <label for="fecha-nac">Fecha de Nacimiento</label>
                        <input type="date" id="fecha-nac">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-limpiar" id="btn-limpiar">Limpiar</button>
                    <button type="button" class="btn-guardar-alumno" id="btn-guardar-alumno">Guardar Alumno</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
